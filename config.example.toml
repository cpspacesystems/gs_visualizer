[server]
host = "0.0.0.0"
port = 8765
name = "tism-bridge"
message_backlog_size = 1024

[bridge]
default_publish_hz = 30.0
open_retry_ms = 250

[[channels]]
tism_address = "imu_shm"
topic = "/imu"
publish_hz = 100.0
on_change_only = true
message_encoding = "flatbuffer"
schema_name = "foxglove.Imu"
schema_encoding = "flatbuffer"
schema_path = "schemas/Imu.bfbs"
max_message_bytes = 1048576

[channels.metadata]
source = "tism"
frame = "base_link"
