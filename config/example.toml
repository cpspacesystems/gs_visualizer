[server]
host = "127.0.0.1"
port = 8765
name = "gs_visualizer"
message_backlog_size = 1024

[bridge]
default_publish_hz = 30.0
open_retry_ms = 250

[[channels]]
tism_address = "helix_publisher"
topic = "/tf"
