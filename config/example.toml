on_change_only = false
message_encoding = "flatbuffer"
schema_name = "foxglove.FrameTransforms"
schema_encoding = "flatbuffer"
schema_path = "../schemas/bfbs/FrameTransforms.bfbs"
max_message_bytes = 184

[channels.metadata]
source = "tism"
parent_frame = "base"
child_frame = "rocket"
